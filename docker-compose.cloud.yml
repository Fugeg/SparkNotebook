# Harness Engineering 监控栈 - 云服务器版本
# 适用于公网 IP: 101.34.251.212
# 
# ⚠️ 安全警告：
# 1. 默认配置下 Grafana 和 Prometheus 暴露在公网，建议：
#    - 使用强密码
#    - 配置 Nginx 反向代理 + HTTPS
#    - 限制访问 IP（通过安全组）
# 2. 生产环境建议使用 VPN 或内网访问

version: '3.8'

services:
  # Prometheus - 指标收集
  prometheus:
    image: prom/prometheus:latest
    container_name: harness-prometheus
    restart: unless-stopped
    ports:
      - "0.0.0.0:9090:9090"  # 暴露到所有接口
    volumes:
      - ./prometheus/prometheus-cloud.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - harness-network

  # Grafana - 可视化仪表盘
  grafana:
    image: grafana/grafana:latest
    container_name: harness-grafana
    restart: unless-stopped
    ports:
      - "0.0.0.0:3000:3000"  # 暴露到所有接口
    environment:
      # ⚠️ 请修改默认密码！
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
      # 安全相关配置
      - GF_SECURITY_DISABLE_GRAVATAR=true
      - GF_SECURITY_ANGULAR_SUPPORT_ENABLED=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - harness-network
    depends_on:
      - prometheus

  # Node Exporter - 系统指标
  node-exporter:
    image: prom/node-exporter:latest
    container_name: harness-node-exporter
    restart: unless-stopped
    ports:
      - "0.0.0.0:9100:9100"  # 可选：暴露系统指标
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - harness-network

volumes:
  prometheus_data:
  grafana_data:

networks:
  harness-network:
    driver: bridge
